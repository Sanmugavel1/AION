services:
  - type: web
    name: aion-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/aion.db
      - key: GRAPH_STORE_PATH
        value: ./data/graph_store.json
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: '["http://localhost:3000"]'
      # Matches the production Vercel domain and every preview deployment
      # for the aion-frontend project (e.g. aion-frontend-<hash>-<team>.vercel.app,
      # aion-frontend-git-<branch>-<team>.vercel.app), so preview builds
      # aren't locked out by CORS. If a custom domain is added later, add it
      # to ALLOWED_ORIGINS above as well.
      - key: ALLOWED_ORIGIN_REGEX
        value: '^https://aion-frontend(-[a-z0-9-]+)?\.vercel\.app$'
