---
apiVersion: v1
kind: Service
metadata:
  name: aion-backend-svc
  namespace: aion
  labels:
    app: aion-backend
spec:
  selector:
    app: aion-backend
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aion-ingress
  namespace: aion
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: api.aion.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aion-backend-svc
                port:
                  number: 80
  tls:
    - hosts:
        - api.aion.ai
      secretName: aion-tls
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aion-backend-hpa
  namespace: aion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aion-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
