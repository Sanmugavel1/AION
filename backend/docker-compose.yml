version: "3.9"

# ── AION Production Docker Compose ────────────────────────────────────────────
# Services: backend, celery_worker, celery_beat, postgres, neo4j, redis,
#           qdrant, minio, kafka, zookeeper, nginx

x-backend-common: &backend-common
  build:
    context: .
    dockerfile: Dockerfile
    target: production
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    neo4j:
      condition: service_healthy
    kafka:
      condition: service_started
  networks:
    - aion-net
  restart: unless-stopped

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    <<: *backend-common
    container_name: aion-backend
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --loop uvloop"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery_worker:
    <<: *backend-common
    container_name: aion-celery-worker
    command: >
      celery -A app.core.celery_app.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=sensing,analysis,intelligence,reports
    healthcheck:
      test: ["CMD", "celery", "-A", "app.core.celery_app.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 30s
      retries: 3

  # ── Celery Beat Scheduler ────────────────────────────────────────────────────
  celery_beat:
    <<: *backend-common
    container_name: aion-celery-beat
    command: >
      celery -A app.core.celery_app.celery_app beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aion-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aion}
      POSTGRES_USER: ${POSTGRES_USER:-aion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aion_secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - aion-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aion} -d ${POSTGRES_DB:-aion}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j Graph Database ─────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.15-community
    container_name: aion-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-aion_neo4j_secret}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - aion-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: aion-redis
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-aion_redis_secret}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - aion-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-aion_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant Vector DB ─────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: aion-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - aion-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:6333/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MinIO Object Storage ─────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-01T16-36-33Z
    container_name: aion-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-aion_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-aion_minio_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - aion-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Zookeeper (Kafka dependency) ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: aion-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - aion-net
    restart: unless-stopped

  # ── Apache Kafka ─────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: aion-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 6
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    networks:
      - aion-net
    restart: unless-stopped

  # ── NGINX Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: aion-nginx
    depends_on:
      - backend
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
    ports:
      - "80:80"
    networks:
      - aion-net
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  redis_data:
  qdrant_data:
  minio_data:
  zookeeper_data:
  kafka_data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  aion-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
